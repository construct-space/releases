name: Release Construct

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.1)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'
        type: string

env:
  APP_NAME: construct
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_label: macos-arm64

          - platform: macos-latest
            target: x86_64-apple-darwin
            os_label: macos-x64

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os_label: linux-x64

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Checkout construct (private)
        uses: actions/checkout@v4
        with:
          repository: construct-space/construct
          token: ${{ secrets.SPACE_RELEASES_TOKEN }}
          ref: ${{ inputs.branch }}
          path: construct

      - name: Set version in configs
        shell: bash
        run: |
          cd construct
          sed -i.bak 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          sed -i.bak 's/^version = "[^"]*"/version = "${{ inputs.version }}"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: construct/src-tauri

      # macOS: import Apple Developer ID certificate into a temporary keychain
      # so Tauri can codesign and notarize the app.
      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Download brain service
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SPACE_RELEASES_TOKEN }}
        run: |
          mkdir -p construct/src-tauri/bin
          BINARY_NAME="construct-brain-${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          echo "Downloading ${BINARY_NAME} from construct-brain latest release..."
          gh release download --repo construct-space/construct-brain --pattern "${BINARY_NAME}" --dir construct/src-tauri/bin/ || {
            echo "Warning: Brain binary not available for this platform, creating placeholder"
            touch "construct/src-tauri/bin/${BINARY_NAME}"
          }
          chmod +x "construct/src-tauri/bin/${BINARY_NAME}" 2>/dev/null || true

      - name: Fix SDK dependency for CI
        shell: bash
        run: |
          cd construct
          sed -i.bak 's|"@construct-space/sdk": "file:../construct-sdk"|"@construct-space/sdk": "latest"|' package.json
          rm -f package.json.bak

      - name: Install dependencies
        run: |
          cd construct
          bun install

      # tauri-action needs the Tauri CLI available. The construct package.json
      # maps "tauri" → "cargo tauri", so we install cargo-tauri here.
      # See: https://github.com/tauri-apps/tauri-action
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # Skip vue-tsc in CI — auto-import .d.ts files are gitignored and
      # only generated during dev. vite build alone is sufficient.
      # Use npx cross-env for Windows compatibility.
      - name: Patch build command for CI
        shell: bash
        run: |
          cd construct
          sed -i.bak 's/"beforeBuildCommand": ".*"/"beforeBuildCommand": "npx cross-env TAURI=true bun run vite build"/' src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak

      # tauri-action builds, creates updater .tar.gz + .sig, and handles
      # codesigning via APPLE_SIGNING_IDENTITY (cert in keychain from above).
      - name: Build & sign with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: construct
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }}

      - name: List bundle output
        shell: bash
        run: find "construct/src-tauri/target/${{ matrix.target }}/release/bundle" -type f | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os_label }}
          path: construct/src-tauri/target/${{ matrix.target }}/release/bundle/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      # Collect and rename assets so each platform has unique filenames.
      # Tauri names .app.tar.gz without arch, so ARM and x64 would collide.
      - name: Collect release assets
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          mkdir -p release-assets

          # macOS ARM
          ARM_DIR="artifacts/build-macos-arm64"
          if [ -d "$ARM_DIR" ]; then
            cp "$ARM_DIR"/dmg/*.dmg release-assets/ 2>/dev/null || true
            # Rename .app.tar.gz to include arch
            for f in "$ARM_DIR"/macos/*.app.tar.gz; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct.Personal_${VERSION}_aarch64.app.tar.gz"
            done
            for f in "$ARM_DIR"/macos/*.app.tar.gz.sig; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct.Personal_${VERSION}_aarch64.app.tar.gz.sig"
            done
          fi

          # macOS x64
          X64_DIR="artifacts/build-macos-x64"
          if [ -d "$X64_DIR" ]; then
            cp "$X64_DIR"/dmg/*.dmg release-assets/ 2>/dev/null || true
            for f in "$X64_DIR"/macos/*.app.tar.gz; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct.Personal_${VERSION}_x64.app.tar.gz"
            done
            for f in "$X64_DIR"/macos/*.app.tar.gz.sig; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct.Personal_${VERSION}_x64.app.tar.gz.sig"
            done
          fi

          # Linux
          LINUX_DIR="artifacts/build-linux-x64"
          if [ -d "$LINUX_DIR" ]; then
            cp "$LINUX_DIR"/appimage/*.AppImage release-assets/ 2>/dev/null || true
            cp "$LINUX_DIR"/appimage/*.AppImage.tar.gz release-assets/ 2>/dev/null || true
            cp "$LINUX_DIR"/appimage/*.AppImage.tar.gz.sig release-assets/ 2>/dev/null || true
            cp "$LINUX_DIR"/deb/*.deb release-assets/ 2>/dev/null || true
          fi

          # Windows
          WIN_DIR="artifacts/build-windows-x64"
          if [ -d "$WIN_DIR" ]; then
            cp "$WIN_DIR"/nsis/*.exe release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/nsis/*.nsis.zip release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/nsis/*.nsis.zip.sig release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/msi/*.msi release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/msi/*.msi.sig release-assets/ 2>/dev/null || true
          fi

          echo "Release assets:"
          ls -la release-assets/

      - name: Generate latest.json for Tauri updater
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"

          # Read signature files (already renamed with arch)
          read_sig() {
            local f="release-assets/$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          MAC_ARM_SIG=$(read_sig "Construct.Personal_${VERSION}_aarch64.app.tar.gz.sig")
          MAC_X64_SIG=$(read_sig "Construct.Personal_${VERSION}_x64.app.tar.gz.sig")
          LINUX_SIG=$(read_sig "Construct.Personal_${VERSION}_amd64.AppImage.tar.gz.sig")
          WIN_SIG=$(read_sig "Construct.Personal_${VERSION}_x64-setup.nsis.zip.sig")

          cat > release-assets/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Construct Personal v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "${BASE_URL}/Construct.Personal_${VERSION}_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${BASE_URL}/Construct.Personal_${VERSION}_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/Construct.Personal_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE_URL}/Construct.Personal_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Construct Personal v${{ inputs.version }}
          body: |
            ## Construct Personal v${{ inputs.version }}

            ### Downloads
            - **macOS (Apple Silicon)**: `.dmg`
            - **macOS (Intel)**: `.dmg`
            - **Linux**: `.AppImage` / `.deb`
            - **Windows**: `.exe` / `.msi`

            ### Auto-Update
            Existing installations will receive this update automatically.
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
