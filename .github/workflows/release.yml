name: Release Construct

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.7.0 or 0.7.0-beta.1)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'
        type: string
      channel:
        description: 'Release channel'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

env:
  APP_NAME: construct
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_label: macos-arm64

          - platform: macos-latest
            target: x86_64-apple-darwin
            os_label: macos-x64

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os_label: linux-x64

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v6

      # Now uses construct-app monorepo (operator is inside)
      - name: Checkout construct-app
        uses: actions/checkout@v6
        with:
          repository: construct-space/construct-app
          token: ${{ secrets.SPACE_RELEASES_TOKEN }}
          ref: ${{ inputs.branch }}
          path: construct-app

      - name: Set version in configs
        shell: bash
        run: |
          cd construct-app
          # Update package.json
          sed -i.bak 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' package.json
          rm -f package.json.bak
          # Update tauri.conf.json
          sed -i.bak 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' desktop/tauri.conf.json
          rm -f desktop/tauri.conf.json.bak
          # Update Cargo.toml
          sed -i.bak 's/^version = "[^"]*"/version = "${{ inputs.version }}"/' desktop/Cargo.toml
          rm -f desktop/Cargo.toml.bak
          # Update operator version
          sed -i.bak 's/const Version = "[^"]*"/const Version = "${{ inputs.version }}"/' operator/cmd/operator/main.go
          rm -f operator/cmd/operator/main.go.bak

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: construct-app/desktop

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # Operator is now inside the monorepo
      - name: Build operator binary
        shell: bash
        run: |
          cd construct-app/operator
          mkdir -p ../desktop/bin

          TARGET="${{ matrix.target }}"
          case "$TARGET" in
            aarch64-apple-darwin) GOOS=darwin GOARCH=arm64 ;;
            x86_64-apple-darwin)  GOOS=darwin GOARCH=amd64 ;;
            x86_64-unknown-linux-gnu) GOOS=linux GOARCH=amd64 ;;
            x86_64-pc-windows-msvc) GOOS=windows GOARCH=amd64 ;;
            *) echo "Unknown target: $TARGET"; exit 1 ;;
          esac

          BINARY_NAME="construct-operator-${TARGET}"
          if [[ "$GOOS" == "windows" ]]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          echo "Building operator: GOOS=$GOOS GOARCH=$GOARCH → $BINARY_NAME"
          GOOS=$GOOS GOARCH=$GOARCH go build -o "../desktop/bin/${BINARY_NAME}" ./cmd/operator
          chmod +x "../desktop/bin/${BINARY_NAME}" 2>/dev/null || true

      - name: Install dependencies
        run: |
          cd construct-app
          bun install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # Build frontend without typecheck (auto-import .d.ts are gitignored)
      - name: Patch build command for CI
        shell: bash
        run: |
          cd construct-app
          sed -i.bak 's/"beforeBuildCommand": ".*"/"beforeBuildCommand": "npx cross-env TAURI=true bun run vite build --config frontend\/vite.config.ts"/' desktop/tauri.conf.json
          rm -f desktop/tauri.conf.json.bak

      - name: Build & sign with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: construct-app
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }}

      - name: Re-sign updater bundles
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="construct-app/desktop/target/${{ matrix.target }}/release/bundle"
          SIGNED=0
          while IFS= read -r -d '' f; do
            echo "Signing: $f"
            cargo tauri signer sign "$f" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            SIGNED=$((SIGNED + 1))
          done < <(find "$BUNDLE_DIR" \( -name "*.app.tar.gz" -o -name "*.nsis.zip" -o -name "*.AppImage.tar.gz" -o -name "*.exe" -o -name "*.msi" \) -print0 2>/dev/null)
          echo "Signed $SIGNED updater bundle(s)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os_label }}
          path: construct-app/desktop/target/${{ matrix.target }}/release/bundle/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          mkdir -p release-assets

          # macOS ARM
          ARM_DIR="artifacts/build-macos-arm64"
          if [ -d "$ARM_DIR" ]; then
            cp "$ARM_DIR"/dmg/*.dmg release-assets/ 2>/dev/null || true
            for f in "$ARM_DIR"/macos/*.app.tar.gz; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct_${VERSION}_aarch64.app.tar.gz"
            done
            for f in "$ARM_DIR"/macos/*.app.tar.gz.sig; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct_${VERSION}_aarch64.app.tar.gz.sig"
            done
          fi

          # macOS x64
          X64_DIR="artifacts/build-macos-x64"
          if [ -d "$X64_DIR" ]; then
            cp "$X64_DIR"/dmg/*.dmg release-assets/ 2>/dev/null || true
            for f in "$X64_DIR"/macos/*.app.tar.gz; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct_${VERSION}_x64.app.tar.gz"
            done
            for f in "$X64_DIR"/macos/*.app.tar.gz.sig; do
              [ -f "$f" ] && cp "$f" "release-assets/Construct_${VERSION}_x64.app.tar.gz.sig"
            done
          fi

          # Linux
          LINUX_DIR="artifacts/build-linux-x64"
          if [ -d "$LINUX_DIR" ]; then
            cp "$LINUX_DIR"/appimage/*.AppImage release-assets/ 2>/dev/null || true
            cp "$LINUX_DIR"/appimage/*.AppImage.tar.gz release-assets/ 2>/dev/null || true
            cp "$LINUX_DIR"/appimage/*.AppImage.tar.gz.sig release-assets/ 2>/dev/null || true
            cp "$LINUX_DIR"/deb/*.deb release-assets/ 2>/dev/null || true
          fi

          # Windows
          WIN_DIR="artifacts/build-windows-x64"
          if [ -d "$WIN_DIR" ]; then
            cp "$WIN_DIR"/nsis/*.exe release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/nsis/*.exe.sig release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/nsis/*.nsis.zip release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/nsis/*.nsis.zip.sig release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/msi/*.msi release-assets/ 2>/dev/null || true
            cp "$WIN_DIR"/msi/*.msi.sig release-assets/ 2>/dev/null || true
          fi

          ls -la release-assets/

      - name: Generate latest.json for Tauri updater
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          CHANNEL="${{ inputs.channel }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"

          # Only include platforms that have both a bundle and a signature
          PLATFORMS=""

          add_platform() {
            local key="$1" url="$2" sig_file="$3"
            if [ -f "release-assets/$sig_file" ]; then
              local sig=$(cat "release-assets/$sig_file")
              if [ -n "$sig" ]; then
                [ -n "$PLATFORMS" ] && PLATFORMS="${PLATFORMS},"
                PLATFORMS="${PLATFORMS}
              \"${key}\": { \"signature\": \"${sig}\", \"url\": \"${url}\" }"
              fi
            fi
          }

          add_platform "darwin-aarch64" \
            "${BASE_URL}/Construct_${VERSION}_aarch64.app.tar.gz" \
            "Construct_${VERSION}_aarch64.app.tar.gz.sig"

          add_platform "darwin-x86_64" \
            "${BASE_URL}/Construct_${VERSION}_x64.app.tar.gz" \
            "Construct_${VERSION}_x64.app.tar.gz.sig"

          add_platform "linux-x86_64" \
            "${BASE_URL}/Construct_${VERSION}_amd64.AppImage.tar.gz" \
            "Construct_${VERSION}_amd64.AppImage.tar.gz.sig"

          # Windows — check nsis.zip first, then msi
          WIN_SIG_FILE=""
          WIN_URL=""
          for pattern in "Construct_${VERSION}_x64-setup*.nsis.zip" "Construct_${VERSION}_x64*.msi"; do
            for f in release-assets/$pattern; do
              [ -f "$f" ] && [ -f "${f}.sig" ] && WIN_SIG_FILE="${f}.sig" && WIN_URL="${BASE_URL}/$(basename "$f")" && break 2
            done
          done
          [ -n "$WIN_SIG_FILE" ] && add_platform "windows-x86_64" "$WIN_URL" "$(basename "$WIN_SIG_FILE")"

          if [ -z "$PLATFORMS" ]; then
            echo "ERROR: No signed platform bundles found. Skipping latest.json."
            exit 1
          fi

          JSON_FILE="latest.json"
          [ "$CHANNEL" = "beta" ] && JSON_FILE="latest-beta.json"

          cat > "release-assets/${JSON_FILE}" << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Construct v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {${PLATFORMS}
            }
          }
          ENDJSON

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: v${{ inputs.version }}
          name: Construct v${{ inputs.version }}
          body: |
            ## Construct v${{ inputs.version }}

            **Channel:** ${{ inputs.channel }}
            **Branch:** ${{ inputs.branch }}

            ### Downloads
            - **macOS (Apple Silicon)**: `.dmg`
            - **macOS (Intel)**: `.dmg`
            - **Linux**: `.AppImage` / `.deb`
            - **Windows**: `.exe` / `.msi`

            ### Auto-Update
            Existing installations will receive this update automatically.
          draft: false
          prerelease: ${{ inputs.channel == 'beta' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
